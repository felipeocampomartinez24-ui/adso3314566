<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/03_style.css">
    <title>sprite</title>
    <style>
        div·sprite {
            background: url(/src/imgs/anim-sprite.png);
            height: 256px;
            width: 256px;
            margin: 1rem auto;
        }
        
        div#sprite.sp1{background-position: calc(-256px *1) 0;}
        div#sprite.sp1{background-position: calc(-256px *2) 0;}
        div#sprite.sp1{background-position: calc(-256px *3) 0;}
        div#sprite.sp1{background-position: calc(-256px *4) 0;}
        div#sprite.sp1{background-position: calc(-256px *5) 0;}
        div#sprite.sp1{background-position: calc(-256px *6) 0;}


    </style>

</head>

<body>
    <header>
        <h1>23-sprite</h1>
        <h2>An image sprite is a collection of images put into a single image.</h2>
    </header>
    <section>
        <div id="sprite" class="sp1"></div>
    </section>
    <script>
    // 1. Corregido: getElementById usa paréntesis (), no =
    const sprite = document.getElementById('sprite1'); 
    const numsprite = 6; 
    let count = 1;

    // 2. Corregido: la función de flecha es () => { ... }
    setInterval(() => {
        // 3. Corregido: es className (con doble 's') 
        // Dejamos una clase base 'sprite' para el diseño y 'spX' para la posición
        sprite.className = 'sprite sp' + count;

        // 4. Lógica de conteo simplificada
        if (count >= numsprite) {
            count = 1;
        } else {
            count++;
        }
    }, 80); 
</script>
</body>

</html>
