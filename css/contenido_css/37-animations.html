<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations - Combat Scene</title>
    <style>
        body {
            background-color: #faf5f5;
            color: #121212;
            font-family: sans-serif;
        }

        section {
            div.jungle {
                background: url('/src/imgs/jungle (1).png') no-repeat center/cover;
                border-radius: 4px;
                margin-block: 2rem;
                position: relative;
                height: 471px;
                width: 100%;
                overflow: hidden;
                /* Animación que hace temblar la pantalla al momento del golpe */
                animation: shake 4s ease-in-out infinite;

                img {
                    position: absolute;
                    bottom: 20px;
                }

                img.logo {
                    top: 20px;
                    left: 50%;
                    bottom: auto; 
                    width: 200px;
                    animation: logo 2s ease-in-out infinite;
                }

                img.dk {
                    left: 5%;
                    width: 140px;
                    object-fit: contain;
                    z-index: 8;
                    /* Ataque coordinado de DK */
                    animation: dk-attack 4s ease-in-out infinite;
                }

                img.rino {
                    right: 5%;
                    width: 120px;
                    /* Ataque coordinado de Rino */
                    animation: rino-attack 4s ease-in-out infinite;
                }
            }
        }

        /* ANIMACIÓN DEL ESCENARIO (TEMBLOR DEL IMPACTO) */
        @keyframes shake {
            0%, 28%, 35%, 100% { transform: translate(0, 0); }
            30% { transform: translate(-5px, 5px); }
            31% { transform: translate(5px, -5px); }
            32% { transform: translate(-5px, -5px); }
            33% { transform: translate(5px, 5px); }
            34% { transform: translate(-2px, 2px); }
        }

        /* ANIMACIÓN DE LOGO */
        @keyframes logo { 
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.15); }
        }

        /* ATAQUE DE DONKEY KONG */
        @keyframes dk-attack {
            0% { 
                left: 5%; 
                bottom: 20px;
                transform: rotate(0deg);
            }
            20% { 
                left: 15%; 
                bottom: 20px;
                transform: rotate(-10deg); /* Se prepara para saltar */
            }
            28% { 
                left: 35%; 
                bottom: 120px; /* Salta y avanza al centro */
                transform: rotate(15deg); 
            }
            30% { 
                left: 38%; 
                bottom: 30px; /* Cae con el golpe (Impacto) */
                transform: rotate(-20deg) scale(1.1); 
            }
            35% { 
                left: 20%; 
                bottom: 20px; /* Rebota hacia atrás por el choque */
                transform: rotate(0deg); 
            }
            100% { 
                left: 5%; 
                bottom: 20px; /* Regresa a su posición original */
                transform: rotate(0deg);
            }
        }

        /* ATAQUE DEL RINOCERONTE */
        @keyframes rino-attack {
            0% { 
                right: 5%; 
                transform: scaleX(1);
            }
            15% { 
                right: 3%; 
                transform: scaleX(1); /* Retrocede un poco tomando impulso */
            }
            28% { 
                right: 35%; 
                transform: scaleX(1) skewX(-10deg); /* Arremete a toda velocidad */
            }
            30% { 
                right: 38%; 
                transform: scaleX(1) scale(1.1); /* Choque físico en el centro */
            }
            35% { 
                right: 25%; 
                transform: scaleX(1) rotate(15deg); /* Queda aturdido hacia atrás */
            }
            60% {
                right: 25%;
                transform: scaleX(1) rotate(0deg); /* Se recupera */
            }
            100% { 
                right: 5%; 
                transform: scaleX(1); /* Vuelve a su lugar */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>37-animations</h1>
        <h2>Lets an element gradually change from one style to another.</h2>
    </header>

    <section>
        <div class="jungle">
            <img src="/src/imgs/logo-dk (1).png" alt="Logo" class="logo">
            <img src="/src/imgs/dk.png" alt="Donkey Kong" class="dk">
            <img src="/src/imgs/ryno.png" alt="Rino" class="rino">
        </div>
    </section>

</body>
</html>
