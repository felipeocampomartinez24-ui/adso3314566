<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations - Professional Combat Scene</title>
    <style>
        :root {
            --combat-duration: 3.5s;
        }

        body {
            background-color: #0f0f11;
            color: #f5f5f7;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
            h1 { margin: 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
            h2 { margin: 5px 0 0; font-size: 1rem; color: #86868b; font-weight: 400; }
        }

        section {
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            box-sizing: border-box;

            div.jungle {
                background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), url('/src/imgs/jungle (1).png') no-repeat center/cover;
                border: 2px solid #333;
                border-radius: 12px;
                position: relative;
                height: 480px;
                width: 100%;
                overflow: hidden;
                box-shadow: 0 20px 40px rgba(0,0,0,0.6);
                animation: stage-shake var(--combat-duration) cubic-bezier(.36,.07,.19,.97) infinite;

                img {
                    position: absolute;
                    bottom: 40px;
                    will-change: transform, bottom, left, right; /* Optimización de renderizado por GPU */
                }

                img.logo {
                    top: 30px;
                    left: 50%;
                    bottom: auto; 
                    width: 180px;
                    transform: translateX(-50%);
                    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
                }

                img.dk {
                    left: 10%;
                    width: 150px;
                    transform-origin: bottom center;
                    animation: dk-combat var(--combat-duration) infinite;
                }

                img.rino {
                    right: 10%;
                    width: 135px;
                    transform-origin: bottom center;
                    animation: rino-combat var(--combat-duration) infinite;
                }
            }
        }

        /* ==========================================================================
           KEYFRAMES PRO: Sincronización milimétrica basada en la física de partículas
           ========================================================================== */

        /* Escenario: Absorbe el impacto en el frame exacto del golpe (30%) */
        @keyframes stage-shake {
            0%, 29%, 36%, 100% { transform: translate(0, 0); filter: brightness(1); }
            30% { transform: translate(-8px, 5px); filter: brightness(1.3); }
            31% { transform: translate(6px, -6px); }
            32% { transform: translate(-5px, -3px); }
            33% { transform: translate(4px, 4px); }
            34% { transform: translate(-2px, -1px); }
            35% { transform: translate(1px, 1px); }
        }

        /* DK: Anticipación hacia atrás, parábola de salto (30%) e inercia de rebote */
        @keyframes dk-combat {
            0% { left: 10%; bottom: 40px; transform: scale(1) rotate(0deg); }
            12% { left: 7%; bottom: 40px; transform: scaleX(0.95) scaleY(1.05) rotate(-8deg); } /* Anticipación */
            28% { left: 34%; bottom: 160px; transform: scaleX(1.1) scaleY(0.9) rotate(20deg); } /* Vuelo (Vértice) */
            30% { left: 38%; bottom: 45px; transform: scaleX(0.85) scaleY(1.2) rotate(-15deg); } /* IMPACTO masivo */
            34% { left: 22%; bottom: 40px; transform: scaleX(1.1) scaleY(0.9) rotate(10deg); } /* Inercia hacia atrás */
            45% { left: 12%; bottom: 40px; transform: scaleX(0.95) scaleY(1.05) rotate(-5deg); } /* Frenado */
            55%, 100% { left: 10%; bottom: 40px; transform: scale(1) rotate(0deg); } /* Recuperación IDLE */
        }

        /* Rino: Carga lineal pesada en el suelo, colisión (30%) y deformación por aplastamiento */
        @keyframes rino-combat {
            0% { right: 10%; transform: scaleX(1) scaleY(1) skewX(0deg); }
            10% { right: 7%; transform: scaleX(1.05) scaleY(0.95) skewX(5deg); } /* Toma impulso */
            26% { right: 32%; transform: scaleX(0.95) scaleY(1.05) skewX(-15deg); } /* Carga máxima velocidad */
            30% { right: 36%; transform: scaleX(1.3) scaleY(0.7) skewX(0deg); } /* IMPACTO: Compresión física */
            35% { right: 20%; transform: scaleX(0.9) scaleY(1.1) rotate(18deg) skewX(10deg); } /* Rebote y desestabilización */
            50% { right: 12%; transform: scaleX(1) scaleY(1) rotate(0deg); } /* Reajuste de pesadez */
            60%, 100% { right: 10%; transform: scaleX(1) scaleY(1) skewX(0deg); } /* Recuperación IDLE */
        }
    </style>
</head>
<body>

    <header>
        <h1>37-animations</h1>
        <h2>Lets an element gradually change from one style to another.</h2>
    </header>

    <section>
        <div class="jungle">
            <img src="/src/imgs/logo-dk (1).png" alt="Logo" class="logo">
            <img src="/src/imgs/dk.png" alt="Donkey Kong" class="dk">
            <img src="/src/imgs/ryno.png" alt="Rino" class="rino">
        </div>
    </section>

</body>
</html>
