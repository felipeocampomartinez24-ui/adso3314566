<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations - Professional Combat Scene</title>
    <style>
        :root {
            --combat-speed: 3.8s;
        }

        body {
            background-color: #0b0b0d;
            color: #f5f5f7;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            h1 { margin: 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 3px; background: linear-gradient(45deg, #ffb703, #fb8500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
            h2 { margin: 5px 0 0; font-size: 0.95rem; color: #6e6e73; font-weight: 400; }
        }

        section {
            width: 100%;
            max-width: 950px;
            padding: 0 20px;
            box-sizing: border-box;

            div.jungle {
                background: linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0.1)), url('/src/imgs/jungle (1).png') no-repeat center/cover;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 16px;
                position: relative;
                height: 500px;
                width: 100%;
                overflow: hidden;
                box-shadow: 0 30px 60px rgba(0,0,0,0.8);
                /* El escenario reacciona al golpe con físicas de vibración */
                animation: stage-clash var(--combat-speed) cubic-bezier(.15,.85,.33,1) infinite;

                img {
                    position: absolute;
                    bottom: 35px;
                    will-change: transform, bottom, left, right, filter;
                }

                img.logo {
                    top: 25px;
                    left: 50%;
                    bottom: auto; 
                    width: 190px;
                    transform: translateX(-50%);
                    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
                    animation: logo-float 3s ease-in-out infinite;
                }

                img.dk {
                    left: 8%;
                    width: 155px;
                    transform-origin: bottom center;
                    animation: dk-moves var(--combat-speed) infinite;
                }

                img.rino {
                    right: 8%;
                    width: 140px;
                    transform-origin: bottom center;
                    /* Invertimos el eje X base porque el asset mira a la izquierda y atacará hacia la derecha */
                    animation: rino-moves var(--combat-speed) infinite;
                }
            }
        }

        /* ==========================================================================
           LÍNEA DE TIEMPO DEL COMBATE PRO (Sincronización milimétrica al 30%)
           ========================================================================== */

        /* 1. EFECTO DE IMPACTO EN EL ESCENARIO (Flash + Sacudida cinematográfica) */
        @keyframes stage-clash {
            0%, 29%, 38%, 100% { transform: translate(0, 0); filter: brightness(1) contrast(1); }
            30% { transform: translate(-10px, 7px); filter: brightness(1.4) contrast(1.2); }
            31% { transform: translate(10px, -7px); }
            32% { transform: translate(-7px, -4px); }
            33% { transform: translate(7px, 5px); }
            34% { transform: translate(-4px, -2px); }
            35% { transform: translate(3px, 2px); }
            36% { transform: translate(-1px, -1px); }
        }

        /* INTERFAZ: Flote sutil del logo */
        @keyframes logo-float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }

        /* 2. MECÁNICAS DE DONKEY KONG (Fase de salto ofensivo) */
        @keyframes dk-moves {
            0% { left: 8%; bottom: 35px; transform: scale(1) rotate(0deg); filter: brightness(1); }
            10% { left: 5%; bottom: 35px; transform: scaleX(0.88) scaleY(1.1) rotate(-12deg); } /* Carga de energía / Anticipación hacia atrás */
            24% { left: 22%; bottom: 180px; transform: scaleX(1.15) scaleY(0.85) rotate(25deg); } /* Vuelo: Máxima velocidad parabólica */
            28% { left: 34%; bottom: 110px; transform: scaleX(1.2) scaleY(0.8) rotate(35deg); filter: brightness(1.2); } /* Descenso con puño cargado */
            30% { left: 37%; bottom: 40px; transform: scaleX(0.75) scaleY(1.3) rotate(-15deg); filter: brightness(1.5); } /* IMPACTO: Compresión de fuerza severa */
            33% { left: 25%; bottom: 35px; transform: scaleX(1.2) scaleY(0.8) rotate(15deg); } /* Inercia negativa: Empujado bruscamente hacia atrás */
            42% { left: 14%; bottom: 35px; transform: scaleX(0.9) scaleY(1.1) rotate(-8deg); } /* Derrape y frenado en suelo */
            52% { left: 8%; bottom: 35px; transform: scaleX(1.05) scaleY(0.95) rotate(0deg); } /* Amortiguación final */
            62%, 100% { left: 8%; bottom: 35px; transform: scale(1) rotate(0deg); } /* Estado de guardia original */
        }

        /* 3. MECÁNICAS DEL RINOCERONTE (Fase de embestida pesada) */
        @keyframes rino-moves {
            0% { right: 8%; bottom: 35px; transform: scaleX(-1) scaleY(1) skewX(0deg); }
            8% { right: 5%; bottom: 35px; transform: scaleX(-1.1) scaleY(0.9) skewX(-8deg); } /* Retroceso de pezuña (Toma impulso) */
            24% { right: 24%; bottom: 35px; transform: scaleX(-0.85) scaleY(1.15) skewX(20deg); } /* Sprint balístico a ras de suelo */
            28% { right: 33%; bottom: 35px; transform: scaleX(-0.8) scaleY(1.2) skewX(25deg); } /* Clava el cuerno para destrozar */
            30% { right: 37%; bottom: 35px; transform: scaleX(-1.4) scaleY(0.6) skewX(0deg); } /* IMPACTO: Absorción del golpe de DK (Aplastamiento masivo) */
            34% { right: 23%; bottom: 35px; transform: scaleX(-0.85) scaleY(1.15) rotate(-20deg) skewX(-15deg); } /* Latigazo cervical hacia atrás por la potencia */
            46% { right: 12%; bottom: 35px; transform: scaleX(-1) scaleY(1) rotate(5deg); } /* Recuperación del peso muerto */
            56% { right: 8%; bottom: 35px; transform: scaleX(-1) scaleY(0.95); } /* Reajuste de articulaciones */
            66%, 100% { right: 8%; bottom: 35px; transform: scaleX(-1) scaleY(1) skewX(0deg); } /* Regreso al reposo */
        }
    </style>
</head>
<body>

    <header>
        <h1>37-animations</h1>
        <h2>Lets an element gradually change from one style to another.</h2>
    </header>

    <section>
        <div class="jungle">
            <img src="/src/imgs/logo-dk (1).png" alt="Logo" class="logo">
            <img src="/src/imgs/dk.png" alt="Donkey Kong" class="dk">
            <img src="/src/imgs/ryno.png" alt="Rino" class="rino">
        </div>
    </section>

</body>
</html>
