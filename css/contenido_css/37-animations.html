<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations</title>
    <style>
        body {
            background-color: #faf5f5;
            color: #121212; /* Cambiado a oscuro para que el texto sea legible sobre fondo blanco */
            font-family: sans-serif;
        }
        h1{font-family: 'Courier New', Courier, monospace;
        font-style: italic;}

        section {
            div.jungle {
                background: url('/src/imgs/jungle (1).png') no-repeat center/cover;
                border-radius: 4px;
                margin-block: 2rem;
                position: relative;
                height: 471px;
                width: 100%;
                overflow: hidden;

                img {
                    position: absolute;
                    bottom: 20px;
                }

                img.logo {
                    top: 20px;
                    left: 50%;
                    bottom: auto; 
                    width: 200px;
                    animation: logo 2s ease-in-out infinite;
                }

                img.dk {
                    left: 120px;
                    width: 140px;
                    object-fit: contain;
                    z-index: 8;
                    /* Usamos bottom en lugar de top para que herede la base correctamente */
                    animation: rino 0.s ease-in-out infinite;
                }

                img.rino {
                    right: 10%;
                    width: 120px;
                    animation: rino 0.2s rino linear infinite ;
                    object-fit: contain;

                }
            }
        }

        /* ANIMACIONES */
        @keyframes logo { 
            0%, 100% {
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(1.15);
            }
        }

        @keyframes dk {
            0%, 100% { 
                bottom: 20px; 
                transform: rotate(0deg); 
            }
            40% { 
                bottom: 120px; 
                transform: rotate(-5deg); 
            }
            60% { 
                bottom: 120px; 
                transform: rotate(5deg); 
            }
             60% { 
                bottom: 120px; 
                transform: rotate(-130deg);
                rotate: calc(60); 
            }
        }

        @keyframes rino {
            0% {
                right: -150px; /* Empieza fuera de la pantalla */
            }
            100% {
                right: 110%; /* Cruza toda la pantalla hacia la izquierda */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>37-animations</h1>
        <h2>Lets an element gradually change from one style to another.</h2>
    </header>

    <section>
        <div class="jungle">
            <img src="/src/imgs/logo-dk (1).png" alt="Logo" class="logo">
            <img src="/src/imgs/dk.png" alt="Donkey Kong" class="dk">
            <img src="/src/imgs/ryno.png" alt="Rino" class="rino">
        </div>
    </section>

</body>
</html>
