<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11-colors</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
        }

        /* Contenedor de las filas */
        section {
            margin-bottom: 2rem;
        }

        /* Contenedor flexible para cada grupo de colores */
        .color-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        /* Estilo base para cada cuadro */
        .color-box {
            height: 80px;
            width: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            transition: transform 0.2s;
            border: 1px solid #ddd;
        }

        .color-box:hover {
            transform: scale(1.1);
        }

        /* Colores de fondo */
        .maroon { background-color: maroon; color: white; }
        .red { background-color: red; color: white; }
        .orange { background-color: orange; }
        .yellow { background-color: yellow; }
        .olive { background-color: olive; color: white; }
        .purple { background-color: purple; color: white; }
        .fuchsia { background-color: fuchsia; color: white; }
        .white { background-color: white; color: black; }
        .lime { background-color: lime; }
        .green { background-color: green; color: white; }
        .navy { background-color: navy; color: white; }
        .blue { background-color: blue; color: white; }
        .aqua { background-color: aqua; }
        .teal { background-color: teal; color: white; }
        .black { background-color: black; color: white; }
        .silver { background-color: silver; }
        .gray { background-color: gray; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>11-colors</h1>
        <p>Predefined color names, RGB, HEX, and HSL.</p>
    </header>

    <!-- Ejemplo 1: RGB -->
    <section>
        <h3>RGB Colors</h3>
        <div class="color-row">
            <div class="color-box maroon">rgb(128,0,0)</div>
            <div class="color-box red">rgb(255,0,0)</div>
            <div class="color-box orange">rgb(255,165,0)</div>
            <div class="color-box yellow">rgb(255,255,0)</div>
            <div class="color-box olive">rgb(128,128,0)</div>
        </div>
    </section>

    <!-- Ejemplo 2: HEX -->
    <section>
        <h3>HEX Colors</h3>
        <div class="color-row">
            <div class="color-box purple">#800080</div>
            <div class="color-box fuchsia">#FF00FF</div>
            <div class="color-box white">#FFFFFF</div>
            <div class="color-box lime">#00FF00</div>
            <div class="color-box green">#008000</div>
        </div>
    </section>

    <!-- Ejemplo 3: HSL -->
    <section>
        <h3>HSL Colors</h3>
        <div class="color-row">
            <div class="color-box navy">hsl(240, 100%, 25%)</div>
            <div class="color-box blue">hsl(240, 100%, 50%)</div>
            <div class="color-box aqua">hsl(180, 100%, 50%)</div>
            <div class="color-box teal">hsl(180, 100%, 25%)</div>
        </div>
    </section>

</body>
</html>
