<style>
    .btn-pseudo {
        padding: 15px 30px; background: #ff4757; border: none; color: white; cursor: pointer;
        transition: 0.3s;
    }
    .btn-pseudo:hover { background: #2f3542; transform: scale(1.1); }
    .btn-pseudo:active { background: orange; }
    
    .list-item:nth-child(odd) { color: lime; } /* Elementos impares */
    .list-item:nth-child(even) { color: cyan; } /* Elementos pares */
</style>
<button class="btn-pseudo">Pásame el mouse (Hover)</button>
<ul>
    <li class="list-item">Elemento 1</li>
    <li class="list-item">Elemento 2</li>
    <li class="list-item">Elemento 3</li>
</ul>
