<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        /* Agregué un fondo oscuro para que resalte tu drop-shadow blanco */
        body {
            background-color:blueviolet;
            color: white;
            font-family: sans-serif;
        }

        /* Corregido: En tu HTML usas <section>, no <main><section> */
        section {
            img {
                border: none;
                border-radius: 0;
                filter: drop-shadow(0 0 12px rgb(255, 255, 255));
                /* Buena práctica: darle un tamaño base para que no rompa el diseño */
                width: 150px; 
                margin: 10px;
            }

            /* CORREGIDO: Se quitaron los ":" después de la clase y se arregló "transform" */
            img.transition1 {
                transition: transform 0.5s ease-in;
                
                /* CORREGIDO: Se eliminó el "hover{}" duplicado interno */
                &:hover {
                    transform: scale(1.3);
                }
            }

            img.transition2 {
                transition: transform 0.5s ease-in;
                
                /* CORREGIDO: Se eliminó el "hover{}" duplicado y se usó transform */
                &:hover {
                    transform: rotate(-180deg);
                }
            }

            /* AGREGADO: La clase transition3 que tenías en el HTML pero no en CSS */
            img.transition3 {
                transition: transform 0.5s ease-in;
                
                &:hover {
                    transform: translate(100px);
                }
            }
        }

        div.box{
            background-color: white;
            height:80px ;
            width:80px ;
            margin-block: 2rem;
            transition:width 1s,
                        height 1s 1s,
                        background-color 2s 1s;
            &:hover{
                background-color: red;
                width: 300px;
                height: 160px;
            }

        }
    </style>
</head>
<body>
    
    <header>
         <h1>Transitions</h1>
         <h2>Enable you to define the transition between two states of an element.</h2>
    </header>

     <section>
        <h3>scale(1.3)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition1">

        <h3>rotate(-180deg)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition2">

        <h3>translate(100px)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition3">
     </section>

</body>
</html>
