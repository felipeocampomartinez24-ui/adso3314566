<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transitions</title>
</head>
<style>
    main section{
        img {
            border:none ;
            border-radius:0 ;
            filter: drop-shadow(0 0 12px rgb(255, 255, 255));
        }
        img.transition1:{
            transition:tranform 0.5s ease-in;
            &:hover{
                hover{
                    transform: scale(1.3);
                }
            }

        }

        img.transition2:{
            transition:tranform 0.5s ease-in;
            &:hover{
                hover{
                    rotate: (-180deg);
                }
            }

        }
        
    
</style>
<body>
    
    <header>
         <h1>transitions</h1>
    
        <h2>Enable you to define the transition between two states of an element.</h2>
    </header>
     <section>
        <h3>scale(1.4)</h3>
        <img src="/src/imgs/dk.png" alt="dk"  class="transition1">
        <h3>rotate(-180deg)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition2">
        <h3>rotate(180px)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition3">
        <h3>translate(100px)</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition3">
        <h3>multiples</h3>
        <img src="/src/imgs/dk.png" alt="dk" class="transition3">

     </section>
</body>
</html>
