<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructura CSS Interno</title>

    <style>
        /* Aquí va todo tu CSS */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .contenedor {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
        }

        .adso {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <main class="contenedor">
        <nav>
            <a href="index.html">Volver</a>
        </nav>

        <header>
            <h1>Título del Documento</h1>
            <p>Descripción del estilo aplicado.</p>
        </header>

        <section>
            <div class="adso">
                <h2>PLATA</h2>
            </div>
        </section>
    </main>

</body>
</html>
