<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .float-container {
        width: 100%;
        border: 2px solid #fff;
        padding: 10px;
        overflow: hidden;
    }

    .img-naruto {
        width: 100px;
        height: 100px;
        background: url('../../src/imgs/naruto-png-clipart.jpg') center/cover;
        margin: 10px;
    }

    .left {
        float: left;
    }

    .right {
        float: right;
    }
</style>

<body>
    <main>
        <header>
            <a href="../../index.html" class="btn-home" title="Inicio">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="white" viewBox="0 0 256 256">
                    <path
                        d="M219.31,108.68l-80-80a16,16,0,0,0-22.62,0l-80,80A15.87,15.87,0,0,0,32,120v96a8,8,0,0,0,8,8h64a8,8,0,0,0,8-8V160h32v56a8,8,0,0,0,8,8h64a8,8,0,0,0,8-8V120A15.87,15.87,0,0,0,219.31,108.68Z">
                    </path>
                </svg>
            </a>
            <h1>16-float</h1>
            <section class="float-container">
                <div class="img-naruto left"></div>
                <p>Este texto fluye a la derecha de la imagen porque tiene float: left.</p>
                <div class="img-naruto right"></div>
                <p>Este texto fluye entre las dos imágenes.</p>
            </section>
        </header>
    </main>
</body>

</html>
