    <style>
        /* Estilos básicos para el cuerpo de la página */
body {
    margin: 0;
    padding: 0;
    background-color: #0a1535; /* Gris muy claro de fondo */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Tipografía limpia */
}

/* Contenedor para centrar el círculo en la pantalla */
.contenedor-principal {
    display: flex;
    justify-content: center; /* Centrado horizontal */
    align-items: center;     /* Centrado vertical */
    height: 100vh;           /* Usa todo el alto de la ventana */
}

/* Estilos para el círculo ADSO */
.circulo-adso {
    /* 1. Dimensiones (deben ser iguales para un círculo perfecto) */
    width: 200px;
    height: 200px;

    /* 2. La clave para el círculo: border-radius al 50% */
    border-radius: 50%;

    /* 3. Colores y apariencia */
    background-color: #9ba397; /* Verde SENA */
    color: white;             /* Texto blanco */
    border: 5px solid #a9afa5; /* Borde verde más oscuro */
    
    /* 4. Estilos de texto */
    font-size: 48px;
    font-weight: bold;
    text-transform: uppercase; /* Forzar mayúsculas */
    letter-spacing: 2px;       /* Espaciado entre letras */
    
    /* 5. Centrar el texto 'ADSO' DENTRO del círculo */
    display: flex;
    justify-content: center; /* Centrado horizontal del texto */
    align-items: center;     /* Centrado vertical del texto */
    
    /* 6. Efecto de sombra para dar profundidad */
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    
    /* 7. Opcional: una pequeña transición por si quieres añadir efectos luego */
    transition: transform 0.3s ease;
}

/* Efecto visual al pasar el mouse por encima */
.circulo-adso:hover {
    transform: scale(1.1); /* Agranda el círculo un 10% */
    cursor: pointer;
}
    </style>
    <div class="contenedor-principal">
        
        <div class="circulo-adso">
            ADSO
        </div>

    </div>

</body>
