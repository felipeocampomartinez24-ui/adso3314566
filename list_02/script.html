<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 - Text JavaScript</title>
    <link rel="stylesheet" href="../src/css/script.css">
</head>

<body>
    <main>
        <!-- Botón de inicio -->
       <a href="../02_index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M184,72H128V32a8,8,0,0,0-13.66-5.66l-96,96a8,8,0,0,0,0,11.32l96,96A8,8,0,0,0,128,224V184h56a8,8,0,0,0,8-8V80A8,8,0,0,0,184,72Zm-8,96H120a8,8,0,0,0-8,8v28.69L35.31,128,112,51.31V80a8,8,0,0,0,8,8h56Zm48-88v96a8,8,0,0,1-16,0V80a8,8,0,0,1,16,0Z">
            </path>
        </svg>
    </a>

        <div class="container">
            <!-- Header con logo y título -->
            <header>
                <img src="./../src/imgs/01tex.png" alt="Logo JavaScript" class="logo-emmet">
                <h1>JavaScript</h1>
                <p>Interacción con el usuario</p>
            </header>

            <!-- Sección principal con el script -->
            <section class="user-section">
                <h2>Saludo Personalizado</h2>
                
                <!-- Elemento donde se mostrará el saludo -->
                <div class="user-message">
                    <span class="user">Cargando...</span>
                </div>

                <script>
                    // Script para saludo personalizado
                    const userElement = document.querySelector('.user');
                    const answer = prompt("¿Cuál es tu nombre?");
                    
                    if (answer && answer.trim() !== '') {
                        userElement.textContent = '👋 Bienvenido/a: ' + answer.trim();
                    } else {
                        userElement.textContent = '👋 Bienvenido/a: Invitado 😐';
                    }
                </script>
            </section>
        </div>
    </main>
</body>

</html>
