<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio CSS Grid Areas - Galería de Imágenes</title>
  <style>
    /* Reset básico y estilos generales */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8rem;
    }

    /* 
      CONTENEDOR GRID
      -----------------------------------------
      Representa una matriz de 3 columnas x 3 filas.
    */
    .grid-container {
      display: grid;
      width: 100%;
      max-width: 1000px;
      gap: 15px;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 220px);
      
      /* Definición del mapa del boceto */
      grid-template-areas:
        "foto1 foto2 foto3"
        "foto4 foto2 foto5"
        "foto6 foto6 foto7";
    }

    /* Asignación de cada clase a su correspondiente área */
    .item-1 { grid-area: foto1; }
    .item-2 { grid-area: foto2; } /* Ocupa filas 1 y 2 en la columna central */
    .item-3 { grid-area: foto3; }
    .item-4 { grid-area: foto4; }
    .item-5 { grid-area: foto5; }
    .item-6 { grid-area: foto6; } /* Ocupa columnas 1 y 2 en la fila inferior */
    .item-7 { grid-area: foto7; }

    /* Estilo de los bloques contenedor de cada imagen */
    .grid-item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      border: 2px solid #333;
    }

    /* Asegurar que las imágenes se adapten sin deformarse */
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    /* Efecto hover suave para las imágenes */
    .grid-item:hover img {
      transform: scale(1.05);
    }

    /* Etiqueta flotante con el número de bloque */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: bold;
      pointer-events: none;
    }
  </style>
</head>
<body>

    <h1>Galería Maquetada con Grid Template Areas</h1>

    <div class="grid-container">
    <!-- Bloque 1: Arriba izquierda -->
    <div class="grid-item item-1">
    <span class="badge">1</span>
    <img src="" alt="Imagen 1">
    </div>
     <div class="grid-item item-1">
        <span class="badge">1 (sakura)</span>
        <img src="/img/sakura_grid_4.jpg" alt="Imagen 2">
    </div>
    <!-- Bloque 2: Centro (Alto - Abarca 2 filas) -->
    <div class="grid-item item-2">
        <span class="badge">2 (naruto)</span>
        <img src="/img/naruto grid 3.jpg" alt="Imagen 2">
    </div>

    <!-- Bloque 3: Arriba derecha -->
    <div class="grid-item item-3">
        <span class="badge">3</span>
        <img src="/img/sasuke.jpg" alt="Imagen 3">
    </div>

    <!-- Bloque 4: Centro izquierda -->
    <div class="grid-item item-4">
        <span class="badge">4 (jiraiya)</span>
        <img src="/img/jiariya.jpg" alt="Imagen 4">
    </div>

    <!-- Bloque 5: Centro derecha -->
    <div class="grid-item item-5">
        <span class="badge">5 (sakura)</span>
        <img src="/img/tsunade.jpg" alt="Imagen 5">
    </div>

    <!-- Bloque 6: Abajo izquierda (Ancho - Abarca 2 columnas) -->
    <div class="grid-item item-6">
        <span class="badge">6 (orochimaru)</span>
        <img src="/img/orochimaru.jpg" alt="Imagen 6">
    </div>

    <!-- Bloque 7: Abajo derecha -->
    <div class="grid-item item-7">
      <span class="badge">7 (kakashi)</span>
      <img src="/img/descarga.webp" alt="Imagen 7">
    </div>
  </div>

</body>
</html>
