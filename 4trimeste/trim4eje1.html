<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parallax-animado {
  height: 100vh;
  width: 100%;
  
  /* Cargar la imagen */
  background-image: url('https://picsum.photos/1600/900');
  background-size: cover;
  background-position: center;

  /* 1. VINCULAR LA ANIMACIÓN */
  /* Nombre: moverFondo | Duración: 20s | Ritmo: lineal | Repetición: infinita y en reversa */
  animation: moverFondo 20s linear infinite alternate;

  /* Centrar el texto en pantalla */
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* 2. DEFINIR LOS PASOS DE LA ANIMACIÓN */
@keyframes moverFondo {
  0% {
    /* Estado inicial: la imagen empieza centrada a la izquierda */
    background-position: 0% 50%;
  }
  100% {
    /* Estado final: la imagen se desplaza hacia la derecha */
    background-position: 100% 50%;
  }
}
</style>
<body>
    <div class="parallax-animado">
  <h1>¡Efecto en Movimiento!</h1>
</div>
</body>
</html>
